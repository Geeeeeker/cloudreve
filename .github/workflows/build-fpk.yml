name: Build Multi-Arch Cloudreve fpk and Release

on:
  push:
    branches: [ master ]
    paths:
      - 'cloudreve/**'
      - '.github/workflows/build-fpk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest          # ✅ 改为 Windows
    env:
      CLOUDREVE_VERSION: "4.15.0"
      PROJECT_DIR: "cloudreve"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download fnpack (Windows)
        shell: powershell
        run: |
          Invoke-WebRequest -Uri https://github.com/snltty/fnpackup/releases/download/v1.1.2/fnpackup-win-x64-v1.1.2.zip -OutFile fnpackup.zip
          Expand-Archive -Path fnpackup.zip -DestinationPath fnpackup
          # 假设 fnpack.exe 就在解压后的根目录（若在子目录请自行调整）
          if (Test-Path fnpackup\fnpack.exe) {
            echo "fnpack.exe found"
          } else {
            echo "fnpack.exe not found, listing files..."
            Get-ChildItem fnpackup -Recurse -Name
            exit 1
          }

      - name: Download Cloudreve binaries (Windows)
        shell: bash
        run: |
          mkdir -p ${{ env.PROJECT_DIR }}/app/bin
          # amd64
          wget https://github.com/cloudreve/cloudreve/releases/download/${{ env.CLOUDREVE_VERSION }}/cloudreve_${{ env.CLOUDREVE_VERSION }}_linux_amd64.tar.gz
          tar -zxvf cloudreve_${{ env.CLOUDREVE_VERSION }}_linux_amd64.tar.gz -C ${{ env.PROJECT_DIR }}/app/bin
          mv ${{ env.PROJECT_DIR }}/app/bin/cloudreve ${{ env.PROJECT_DIR }}/app/bin/cloudreve-amd64
          # arm64
          wget https://github.com/cloudreve/cloudreve/releases/download/${{ env.CLOUDREVE_VERSION }}/cloudreve_${{ env.CLOUDREVE_VERSION }}_linux_arm64.tar.gz
          tar -zxvf cloudreve_${{ env.CLOUDREVE_VERSION }}_linux_arm64.tar.gz -C ${{ env.PROJECT_DIR }}/app/bin
          mv ${{ env.PROJECT_DIR }}/app/bin/cloudreve ${{ env.PROJECT_DIR }}/app/bin/cloudreve-arm64
          rm *.tar.gz

      - name: Build multi-arch fpk (Windows)
        shell: cmd
        run: |
          fnpackup\fnpack.exe build %PROJECT_DIR%

      - name: Upload fpk artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloudreve-fpk-multiarch
          path: ${{ env.PROJECT_DIR }}/target/cloudreve_${{ env.CLOUDREVE_VERSION }}_all.fpk
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest          # release 过程无需 Windows
    env:
      CLOUDREVE_VERSION: "4.15.0"
      TAG_NAME: cloudreve-fpk-v4.15.0
      RELEASE_FILE: cloudreve_4.15.0_all.fpk
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: cloudreve-fpk-multiarch
          path: ./

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Cloudreve ${{ env.CLOUDREVE_VERSION }} fpk (Multi-arch)
          body: |
            Cloudreve ${{ env.CLOUDREVE_VERSION }} 多架构 fpk 安装包。
            - 适用于 x86_64 及 arm64 的飞牛系统。
            - 仓库地址：https://github.com/Geeeeeker/cloudreve
          files: ${{ env.RELEASE_FILE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-json:
    needs: release
    runs-on: ubuntu-latest
    # ... 保持不变
