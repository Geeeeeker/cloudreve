      - name: Download application icon
        shell: powershell
        run: |
          $dest = "${{ env.PROJECT_DIR }}\cloudreve.png"
          Invoke-WebRequest -Uri "https://avatars.githubusercontent.com/u/48898462?s=200&v=4" -OutFile $dest
          Copy-Item $dest "${{ env.PROJECT_DIR }}\cloudreve_light.png"

      - name: Generate manifest and startup script
        shell: bash
        run: |
          # 写入 manifest.json（保留以防万一）
          cat > ${{ env.PROJECT_DIR }}/manifest.json <<'MANIFEST_EOF'
          {
            "name": "cloudreve",
            "display_name": "Cloudreve云盘",
            "version": "4.15.0",
            "desc": "Cloudreve 公有云文件系统",
            "arch": ["x86_64", "arm64"],
            "executable": "app/start.sh",
            "icon": "cloudreve.png",
            "icon_light": "cloudreve_light.png",
            "package_format": "native"
          }
          MANIFEST_EOF

          # 同时生成一个无扩展名的 manifest（fnpack 可能这样要求）
          cp ${{ env.PROJECT_DIR }}/manifest.json ${{ env.PROJECT_DIR }}/manifest

          # 写入 start.sh
          cat > ${{ env.PROJECT_DIR }}/app/start.sh <<'START_EOF'
          #!/bin/bash
          ARCH=$(uname -m)
          DIR=$(dirname "$0")
          case "$ARCH" in
            x86_64|amd64)
              exec "$DIR/bin/cloudreve-amd64" "$@"
              ;;
            aarch64|arm64)
              exec "$DIR/bin/cloudreve-arm64" "$@"
              ;;
            *)
              echo "Unsupported architecture: $ARCH" >&2
              exit 1
              ;;
          esac
          START_EOF

          chmod +x ${{ env.PROJECT_DIR }}/app/start.sh

      - name: Debug - List project files
        shell: cmd
        run: dir cloudreve /s /b

      - name: Build multi-arch fpk
        shell: cmd
        run: fnpackup-win-x64\fnpack.exe build %PROJECT_DIR%
