      - name: Generate manifest, startup script, and icon
        shell: bash
        run: |
          # 下载图标（同一个图片用作普通和浅色图标）
          curl -L -o ${{ env.PROJECT_DIR }}/cloudreve.png https://avatars.githubusercontent.com/u/48898462?s=200&v=4
          cp ${{ env.PROJECT_DIR }}/cloudreve.png ${{ env.PROJECT_DIR }}/cloudreve_light.png

          # 写入 manifest.json
          cat > ${{ env.PROJECT_DIR }}/manifest.json <<'MANIFEST_EOF'
          {
            "name": "cloudreve",
            "display_name": "Cloudreve云盘",
            "version": "4.15.0",
            "desc": "☁️ Cloudreve 是一个支持多家云存储驱动的公有云文件系统，支持WebDAV。多架构合一，适用于 x86_64 和 arm64 飞牛系统。",
            "arch": ["x86_64", "arm64"],
            "maintainer": "Geeeeeker",
            "maintainer_url": "https://github.com/Geeeeeker/cloudreve",
            "distributor": "Geeeeeker",
            "distributor_url": "https://github.com/Geeeeeker/cloudreve",
            "helpurl": "https://docs.cloudreve.org/",
            "executable": "app/start.sh",
            "web_ui": "",
            "desktop_applaunchname": "cloudreve",
            "desktop_uidir": "ui",
            "icon": "cloudreve.png",
            "icon_light": "cloudreve_light.png",
            "package_format": "native",
            "source": "thirdparty"
          }
          MANIFEST_EOF

          # 写入 start.sh
          cat > ${{ env.PROJECT_DIR }}/app/start.sh <<'START_EOF'
          #!/bin/bash
          ARCH=$(uname -m)
          DIR=$(dirname "$0")
          case "$ARCH" in
            x86_64|amd64)
              exec "$DIR/bin/cloudreve-amd64" "$@"
              ;;
            aarch64|arm64)
              exec "$DIR/bin/cloudreve-arm64" "$@"
              ;;
            *)
              echo "Unsupported architecture: $ARCH" >&2
              exit 1
              ;;
          esac
          START_EOF

          chmod +x ${{ env.PROJECT_DIR }}/app/start.sh
