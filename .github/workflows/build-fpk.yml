name: Build Multi-Arch Cloudreve fpk and Release

on:
  push:
    branches: [ master ]
    paths:
      - 'cloudreve/**'
      - '.github/workflows/build-fpk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      CLOUDREVE_VERSION: "4.15.0"
      PROJECT_DIR: "cloudreve"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download fnpack (Windows)
        shell: powershell
        run: |
          Invoke-WebRequest -Uri https://github.com/snltty/fnpackup/releases/download/v1.1.2/fnpackup-win-x64-v1.1.2.zip -OutFile fnpackup.zip
          Expand-Archive -Path fnpackup.zip -DestinationPath .
          if (Test-Path fnpackup-win-x64\fnpack.exe) {
            Write-Host "fnpack.exe found"
          } else {
            Get-ChildItem fnpackup-win-x64 -Recurse -Name
            exit 1
          }

      - name: Download Cloudreve binaries
        shell: bash
        run: |
          mkdir -p ${{ env.PROJECT_DIR }}/app/bin
          curl -L -o cloudreve_amd64.tar.gz https://github.com/cloudreve/cloudreve/releases/download/${{ env.CLOUDREVE_VERSION }}/cloudreve_${{ env.CLOUDREVE_VERSION }}_linux_amd64.tar.gz
          tar -zxvf cloudreve_amd64.tar.gz -C ${{ env.PROJECT_DIR }}/app/bin
          mv ${{ env.PROJECT_DIR }}/app/bin/cloudreve ${{ env.PROJECT_DIR }}/app/bin/cloudreve-amd64
          curl -L -o cloudreve_arm64.tar.gz https://github.com/cloudreve/cloudreve/releases/download/${{ env.CLOUDREVE_VERSION }}/cloudreve_${{ env.CLOUDREVE_VERSION }}_linux_arm64.tar.gz
          tar -zxvf cloudreve_arm64.tar.gz -C ${{ env.PROJECT_DIR }}/app/bin
          mv ${{ env.PROJECT_DIR }}/app/bin/cloudreve ${{ env.PROJECT_DIR }}/app/bin/cloudreve-arm64
          rm *.tar.gz

      - name: Download icons
        shell: powershell
        run: |
          $icon = "${{ env.PROJECT_DIR }}\ICON.PNG"
          Invoke-WebRequest -Uri "https://avatars.githubusercontent.com/u/48898462?s=200&v=4" -OutFile $icon
          Copy-Item $icon "${{ env.PROJECT_DIR }}\ICON_256.PNG"

      - name: Generate manifest and start script
        shell: bash
        run: |
          cat > ${{ env.PROJECT_DIR }}/manifest <<'EOF'
          appname                    = cloudreve
          version                    = 4.15.0
          display_name               = Cloudreve云盘
          desc                       = Cloudreve 公有云文件系统，支持WebDAV。多架构合一，适用于 x86_64 和 arm64 飞牛系统。
          platform                   = all
          source                     = thirdparty
          maintainer                 = Geeeeeker
          maintainer_url             = https://github.com/Geeeeeker/cloudreve
          distributor                = Geeeeeker
          distributor_url            = https://github.com/Geeeeeker/cloudreve
          executable                 = app/start.sh
          icon                       = ICON.PNG
          icon_light                 = ICON.PNG
          package_format             = native
          arch                       = x86_64 arm64
          EOF

          cat > ${{ env.PROJECT_DIR }}/app/start.sh <<'EOF'
          #!/bin/bash
          ARCH=$(uname -m)
          DIR=$(dirname "$0")
          case "$ARCH" in
            x86_64|amd64)
              exec "$DIR/bin/cloudreve-amd64" "$@"
              ;;
            aarch64|arm64)
              exec "$DIR/bin/cloudreve-arm64" "$@"
              ;;
            *)
              echo "Unsupported architecture: $ARCH" >&2
              exit 1
              ;;
          esac
          EOF
          chmod +x ${{ env.PROJECT_DIR }}/app/start.sh

      - name: Create cmd/main entry point
        shell: bash
        run: |
          mkdir -p ${{ env.PROJECT_DIR }}/cmd
          cat > ${{ env.PROJECT_DIR }}/cmd/main <<'EOF'
          #!/bin/sh
          exec app/start.sh
          EOF
          chmod +x ${{ env.PROJECT_DIR }}/cmd/main

      - name: Create all required cmd scripts (install/uninstall/upgrade)
        shell: bash
        run: |
          for script in install_init install_callback uninstall_init uninstall_callback upgrade_init upgrade_callback start_init stop_init; do
            cat > ${{ env.PROJECT_DIR }}/cmd/$script <<'EOF'
          #!/bin/sh
          exit 0
          EOF
            chmod +x ${{ env.PROJECT_DIR }}/cmd/$script
          done

      - name: Create config files
        shell: bash
        run: |
          mkdir -p ${{ env.PROJECT_DIR }}/config
          echo '{}' > ${{ env.PROJECT_DIR }}/config/privilege
          echo '{}' > ${{ env.PROJECT_DIR }}/config/config.json
          echo '{}' > ${{ env.PROJECT_DIR }}/config/resource
          echo '{}' > ${{ env.PROJECT_DIR }}/config/plugin

      - name: Debug file list
        shell: cmd
        run: dir cloudreve /s /b

      - name: Build multi-arch fpk
        shell: cmd
        run: fnpackup-win-x64\fnpack.exe build %PROJECT_DIR%

      - name: Upload fpk artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloudreve-fpk-multiarch
          path: ${{ env.PROJECT_DIR }}/target/cloudreve_${{ env.CLOUDREVE_VERSION }}_all.fpk
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    env:
      CLOUDREVE_VERSION: "4.15.0"
      TAG_NAME: cloudreve-fpk-v4.15.0
      RELEASE_FILE: cloudreve_4.15.0_all.fpk
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: cloudreve-fpk-multiarch
          path: ./

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Cloudreve ${{ env.CLOUDREVE_VERSION }} fpk (Multi-arch)
          body: |
            Cloudreve ${{ env.CLOUDREVE_VERSION }} 多架构 fpk 安装包。
            - 适用于 x86_64 及 arm64 的飞牛系统。
            - 仓库地址：https://github.com/Geeeeeker/cloudreve
          files: ${{ env.RELEASE_FILE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-json:
    needs: release
    runs-on: ubuntu-latest
    env:
      CLOUDREVE_VERSION: "4.15.0"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update fnpack.json with release link
        run: |
          DOWNLOAD_URL="https://github.com/Geeeeeker/cloudreve/releases/download/cloudreve-fpk-v${CLOUDREVE_VERSION}/cloudreve_${CLOUDREVE_VERSION}_all.fpk"
          jq --arg url "$DOWNLOAD_URL" --arg ver "$CLOUDREVE_VERSION" \
            '.Cloudreve = {
                "display_name": "Cloudreve云盘",
                "platform": "all",
                "desc": "☁️Cloudreve 是一个支持多家云存储驱动的公有云文件系统。",
                "labels": "原生,工具,存储",
                "version": $ver,
                "download_url": $url,
                "distributor": "Geeeeeker",
                "distributor_url": "https://github.com/Geeeeeker/cloudreve",
                "bug_report_url": "https://github.com/Geeeeeker/cloudreve/issues",
                "install_type": "存储空间",
                "size": "待填",
                "changelog": "首次发布多架构fpk"
            }' fnpack.json > tmp.json && mv tmp.json fnpack.json

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fnpack.json
          git commit -m "chore: update fnpack.json with Cloudreve release link [skip ci]" || echo "No changes to commit"
          git push
