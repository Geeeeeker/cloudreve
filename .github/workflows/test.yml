name: Build Cloudreve for iOS

on:
  workflow_dispatch:
    inputs:
      architecture:
        description: 'Target Architecture'
        required: true
        default: 'arm64'
        type: choice
        options:
          - arm64
          - armv7

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Cloudreve source with submodules
        uses: actions/checkout@v4
        with:
          repository: 'cloudreve/Cloudreve'
          submodules: 'recursive'
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install yarn
        run: npm install -g yarn

      - name: Disable PWA plugin in vite config
        working-directory: assets
        run: |
          # 备份原始配置
          cp vite.config.ts vite.config.ts.bak
          # 使用 sed 删除 VitePWA 插件的导入和使用
          sed -i '/import { VitePWA } from/d' vite.config.ts
          sed -i '/VitePWA({/,/}),/d' vite.config.ts
          # 验证修改（可选）
          grep -q "VitePWA" vite.config.ts && echo "PWA still present" || echo "PWA disabled"

      - name: Build frontend assets
        run: |
          export COMMIT_SHA=$(git rev-parse --short HEAD)
          export VERSION=$(git describe --tags --always)
          chmod +x .build/build-assets.sh
          ./.build/build-assets.sh $VERSION

      - name: Restore original vite config (optional)
        working-directory: assets
        run: cp vite.config.ts.bak vite.config.ts || true

      - name: Cross compile for iOS
        run: |
          go clean -cache
          if [ "${{ github.event.inputs.architecture }}" = "arm64" ]; then
            export GOOS=ios
            export GOARCH=arm64
            export OUTPUT_NAME="cloudreve_ios_arm64"
          else
            export GOOS=ios
            export GOARCH=arm
            export OUTPUT_NAME="cloudreve_ios_armv7"
          fi
          export CGO_ENABLED=0
          export CC=
          export COMMIT_SHA=$(git rev-parse --short HEAD)
          export VERSION=$(git describe --tags --always)
          go build -a -o $OUTPUT_NAME \
            -ldflags="-s -w -buildmode=pie \
              -X 'github.com/cloudreve/Cloudreve/v4/application/constants.BackendVersion=$VERSION' \
              -X 'github.com/cloudreve/Cloudreve/v4/application/constants.LastCommit=$COMMIT_SHA'"
          tar -czf ${OUTPUT_NAME}.tar.gz $OUTPUT_NAME

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloudreve-ios-${{ github.event.inputs.architecture }}
          path: cloudreve_ios_*.tar.gz
